<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>67</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  svg {
    display: block;
    width: 100vw;
    height: 100vh;
  }

  text {
    fill: #fff;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 900;
  }
</style>
</head>
<body>
  <svg viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice">
    <text
      x="500"
      y="500"
      text-anchor="middle"
      dominant-baseline="central"
      textLength="900"
      lengthAdjust="spacingAndGlyphs"
      style="font-size: 200px; transform: scaleY(3); transform-origin: 500px 500px;"
    >KEVIN GAY</text>
  </svg>
</body>
</html>
