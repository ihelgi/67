<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>67</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  .wrap {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .testo {
    color: #fff;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 900;
    font-size: 18vw;       /* occupa tutta la larghezza, senza sforare */
    line-height: 0.8;
    white-space: nowrap;
    transform: scaleY(6);  /* stretch verso l'alto, aumentato */
    transform-origin: center;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="testo">KEVIN GAY</div>
  </div>
</body>
</html>
