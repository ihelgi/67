<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>67</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  svg {
    display: block;
    width: 100vw;
    height: 100vh;
  }

  text {
    fill: #fff;
    font-family: "Futura Condensed Extra Bold", "Futura Extra Bold", "Futura Bold", Oswald, sans-serif;
    font-weight: 800;
  }
</style>
</head>
<body>
  <svg viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice">
    <!-- RIQUADRO FISSO: definisce esattamente dove vive il testo -->
    <!-- x, y, width, height del riquadro: modifica questi 4 valori per cambiare l'area -->
    <foreignObject x="50" y="50" width="900" height="900">
      <div xmlns="http://www.w3.org/1999/xhtml" class="box">
        <span id="testo">KEVIN GAY</span>
      </div>
    </foreignObject>
  </svg>

  <style>
    .box {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }

    #testo {
      color: #fff;
      font-family: "Futura Condensed Extra Bold", "Futura Extra Bold", "Futura Bold", Oswald, sans-serif;
      font-weight: 800;
      white-space: nowrap;
      font-size: 200px;       /* dimensione base, verrà scalata da JS */
      line-height: 1;
      transform-origin: center center;
      display: inline-block;
    }
  </style>

  <script>
    const SCALE_Y = 3;        // <- fattore di stretch verticale
    const BOX_W = 900;        // larghezza riquadro (deve combaciare col foreignObject sopra)
    const BOX_H = 900;        // altezza riquadro

    const el = document.getElementById('testo');

    function fit() {
      el.style.transform = 'none';
      el.style.fontSize = '200px';

      // misura il testo "naturale" (senza stretch) in pixel reali
      const rect = el.getBoundingClientRect();
      const svgRect = el.closest('svg').getBoundingClientRect();

      // converto in unità del viewBox (1000x1000), indipendente dalla risoluzione
      const scaleViewbox = 1000 / svgRect.width;
      const naturalW = rect.width * scaleViewbox;

      // scala il font perché la larghezza naturale riempia esattamente BOX_W
      const fontScale = BOX_W / naturalW;
      el.style.fontSize = (200 * fontScale) + 'px';

      // applica lo stretch verticale fisso attorno al centro
      el.style.transform = `scaleY(${SCALE_Y})`;
    }

    fit();
    window.addEventListener('resize', fit);
    document.fonts.ready.then(fit);
  </script>
</body>
</html>
